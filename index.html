<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Title (VERY IMPORTANT for SEO) -->
    <title>
      Homilivo | Rental Flats, Rooms, PG, Single Rooms & Homes in India
    </title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="Find rental flats, rooms, single rooms, PG accommodations, and homes across India. Homilivo connects you with verified owners for safe and easy renting."
    />

    <!-- SEO Keywords -->
    <meta
      name="keywords"
      content="rental flats, rooms for rent, single room, PG near me, apartments for rent, shared rooms, homes for rent, rental platform India, homilivo"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Homilivo | Find Rental Flats, Rooms & PGs"
    />
    <meta
      property="og:description"
      content="Discover rental flats, single rooms, PGs and homes with verified owners."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://homilivo.com" />
    <meta property="og:image" content="https://homilivo.com/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0b1220" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <noscript>You need to enable JavaScript to run Homilivo.</noscript>

    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
